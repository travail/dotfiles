[theme]
auto_switch = false

[keys]
prefix = "ctrl+t"
next_tab = "prefix+ctrl+n"
previous_tab = "prefix+ctrl+p"
previous_agent = "prefix+,"
next_agent = "prefix+."
focus_agent = "prefix+ctrl+1..9"

[ui]
agent_panel_sort = "spaces"
confirm_close = true
prompt_new_tab_name = false
show_agent_labels_on_pane_borders = true

[ui.toast]
delivery = "herdr"

[ui.sound]
enabled = false
